<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acessando grupo de ofertas...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Inter', sans-serif;
      background: #050505; color: #f5f5f5;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px; padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 22px; font-weight: 900; letter-spacing: -.5px;
      color: #f5f5f5;
    }
    .logo em { color: #dc2626; font-style: normal; }

    .spinner-wrap {
      position: relative; width: 72px; height: 72px;
    }
    .spinner {
      width: 72px; height: 72px;
      border: 3px solid rgba(255,255,255,.08);
      border-top-color: #25D366;
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    .spinner-ico {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      font-size: 17px; font-weight: 700; letter-spacing: -.3px;
    }
    .sub {
      font-size: 13px; color: #666; margin-top: 6px; line-height: 1.6;
    }

    .manual {
      font-size: 12px; color: #444; margin-top: 8px;
    }
    .manual a {
      color: #25D366; text-decoration: none; font-weight: 600;
    }

    .bar-wrap {
      width: 180px; height: 3px;
      background: rgba(255,255,255,.08); border-radius: 99px;
      overflow: hidden;
    }
    .bar {
      height: 100%; width: 0%; background: #25D366; border-radius: 99px;
      transition: width linear;
    }
  </style>
</head>
<body>

  <div class="logo">PRS<em>.</em></div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-ico">📲</div>
  </div>

  <div>
    <p class="msg">Abrindo o grupo de ofertas...</p>
    <p class="sub">Você será redirecionado em instantes.<br>É grátis, sem cadastro.</p>
  </div>

  <div class="bar-wrap">
    <div class="bar" id="bar"></div>
  </div>

  <p class="manual">Não redirecionou? <a href="https://chat.whatsapp.com/LbEBkss5MLX5VOy8vmSiCW" id="link">Clique aqui</a></p>

  <script>
    const DEST = 'https://chat.whatsapp.com/LbEBkss5MLX5VOy8vmSiCW';
    const DELAY = 2500;

    const bar = document.getElementById('bar');
    bar.style.transitionDuration = DELAY + 'ms';
    requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = '100%'; }));

    setTimeout(() => { window.location.href = DEST; }, DELAY);
  </script>
</body>
</html>
